<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders | HASSI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .orders-page {
            padding: 80px 5%;
            min-height: 70vh;
        }

        .order-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            transition: 0.3s;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .order-card:hover {
            border-color: #d4af37;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .order-id {
            color: #d4af37;
            font-weight: 700;
        }

        .order-status {
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .order-status.delivered {
            background: #28a745;
            color: #fff;
        }

        .order-status.processing {
            background: #ffc107;
            color: #000;
        }

        .order-status.shipped {
            background: #17a2b8;
            color: #fff;
        }

        .order-status.cancelled {
            background: #dc3545;
            color: #fff;
        }

        .order-items {
            padding: 15px 0;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 8px 0;
        }

        .order-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
        }

        .order-item .item-info {
            flex: 1;
        }

        .order-item .item-info h4 {
            font-size: 14px;
        }

        .order-item .item-info p {
            color: #888;
            font-size: 13px;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #333;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-footer .total {
            font-size: 18px;
            font-weight: 700;
            color: #d4af37;
        }

        .order-billing {
            color: #888;
            font-size: 13px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #222;
        }

        .order-billing strong {
            color: #aaa;
        }

        .empty-orders {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-orders i {
            font-size: 60px;
            color: #d4af37;
        }

        .empty-orders h3 {
            margin: 20px 0 10px;
        }

        .empty-orders p {
            color: #888;
        }

        .refresh-btn {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-left: 15px;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading-spinner i {
            font-size: 30px;
            color: #d4af37;
        }

        @media (max-width: 600px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .order-footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">HASSI <span>Signature Noir</span></a>
            <button class="menu-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Shop</a></li>
                <li><a href="orders.html" class="active">Orders</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <a href="#"><i class="fa-regular fa-user"></i></a>
                <a href="#" id="cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-count">0</span>
                </a>
            </div>
        </nav>
    </header>

    <!-- Orders -->
    <section class="orders-page">
        <div class="section-heading">
            <span>✦ Orders ✦</span>
            <h2>All Orders</h2>
            <p style="color:#888;">
                Total: <span id="totalOrders">0</span> orders
                <button class="refresh-btn" onclick="loadOrders()">
                    <i class="fa-solid fa-rotate"></i> Refresh
                </button>
            </p>
        </div>
        <div id="orders-container">
            <div class="loading-spinner">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p>Loading orders...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-box">
                <h3>HASSI</h3>
                <p>Luxury perfumes crafted for elegance.</p>
            </div>
            <div class="footer-box">
                <h3>Contact</h3>
                <p>hassanali590110@gmail.com</p>
                <p>+92 332 3365097</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 HASSI Signature Noir.</p>
        </div>
    </footer>

    <!-- ===== COMPLETE JAVASCRIPT WITH FIREBASE ===== -->
    <script type="module">
        // ====================================
        // ORDERS PAGE - FIREBASE
        // ====================================
       import { auth, db, collection, getDocs, onSnapshot, query, orderBy } from './firebase.js';
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function formatPrice(price) {
            return Number(price).toLocaleString('en-PK');
        }

        // ====================================
        // LOAD ORDERS FROM FIREBASE
        // ====================================
        window.loadOrders = async function () {
            const container = document.getElementById('orders-container');
            if (!container) return;

            // Show loading
            container.innerHTML = `
                <div class="loading-spinner">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Loading orders from Firebase...</p>
                </div>
            `;

            try {
                // Try Firebase first
                const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);

                let orders = [];
                snapshot.forEach(doc => {
                    orders.push({ id: doc.id, ...doc.data() });
                });

                if (orders.length > 0) {
                    displayOrders(orders);
                    document.getElementById('totalOrders').textContent = orders.length;
                    console.log('✅ Orders loaded from Firebase:', orders.length);
                } else {
                    // Fallback to localStorage
                    const localOrders = JSON.parse(localStorage.getItem('orders')) || [];
                    if (localOrders.length > 0) {
                        displayOrders(localOrders);
                        document.getElementById('totalOrders').textContent = localOrders.length;
                        console.log('📦 Orders loaded from localStorage:', localOrders.length);
                    } else {
                        showEmptyState();
                    }
                }

                // Setup real-time listener
                setupRealtimeListener();

            } catch (error) {
                console.error('❌ Firebase Error:', error);
                // Fallback to localStorage
                const localOrders = JSON.parse(localStorage.getItem('orders')) || [];
                if (localOrders.length > 0) {
                    displayOrders(localOrders);
                    document.getElementById('totalOrders').textContent = localOrders.length;
                    console.log('📦 Fallback to localStorage:', localOrders.length);
                } else {
                    showEmptyState();
                }
            }
        };

        // ====================================
        // REAL-TIME LISTENER
        // ====================================
        function setupRealtimeListener() {
            try {
                const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));

                onSnapshot(q, (snapshot) => {
                    const orders = [];
                    snapshot.forEach(doc => {
                        orders.push({ id: doc.id, ...doc.data() });
                    });

                    if (orders.length > 0) {
                        displayOrders(orders);
                        document.getElementById('totalOrders').textContent = orders.length;
                        console.log('🔄 Real-time update:', orders.length, 'orders');
                    }
                }, (error) => {
                    console.log('⚠️ Real-time listener error:', error);
                });

            } catch (error) {
                console.log('⚠️ Real-time listener not available');
            }
        }

        // ====================================
        // DISPLAY ORDERS
        // ====================================
        function displayOrders(orders) {
            const container = document.getElementById('orders-container');
            if (!container) return;

            if (orders.length === 0) {
                showEmptyState();
                return;
            }

            container.innerHTML = '';
            orders.forEach(order => {
                const statusClass = order.status || 'processing';
                const statusLabels = {
                    delivered: 'Delivered ✓',
                    processing: 'Processing ⏳',
                    shipped: 'Shipped 🚚',
                    cancelled: 'Cancelled ✕'
                };

                let itemsHTML = '';
                if (order.items && order.items.length > 0) {
                    order.items.forEach(item => {
                        itemsHTML += `
                            <div class="order-item">
                                <img src="${item.image || 'https://via.placeholder.com/50'}" alt="${item.name}">
                                <div class="item-info">
                                    <h4>${item.name}</h4>
                                    <p>Qty: ${item.quantity || 1} × Rs. ${formatPrice(item.price)}</p>
                                </div>
                            </div>
                        `;
                    });
                }

                container.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">📦 Order #${order.id}</span>
                            <span class="order-date" style="color:#888; font-size:14px;">${order.date || new Date(order.createdAt).toLocaleDateString()}</span>
                            <span class="order-status ${statusClass}">${statusLabels[statusClass]}</span>
                        </div>
                        <div class="order-items">${itemsHTML}</div>
                        <div class="order-footer">
                            <span class="total">Total: Rs. ${formatPrice(order.total || 0)}</span>
                            <span style="color:#888; font-size:13px;">💳 ${order.paymentMethod || 'Cash on Delivery'}</span>
                        </div>
                        <div class="order-billing">
                            <strong>👤 ${order.billing?.name || 'Unknown'}</strong> |
                            📧 ${order.billing?.email || 'N/A'} |
                            📞 ${order.billing?.phone || 'N/A'} |
                            📍 ${order.billing?.address || 'N/A'}
                        </div>
                    </div>
                `;
            });
        }

        // ====================================
        // SHOW EMPTY STATE
        // ====================================
        function showEmptyState() {
            const container = document.getElementById('orders-container');
            container.innerHTML = `
                <div class="empty-orders">
                    <i class="fa-regular fa-clock"></i>
                    <h3>No Orders Yet</h3>
                    <p>Orders will appear here once customers place them.</p>
                </div>
            `;
            document.getElementById('totalOrders').textContent = '0';
        }

        // ====================================
        // CART FUNCTIONS
        // ====================================
        function updateCartUI() {
            const items = document.getElementById('cart-items');
            const total = document.getElementById('cart-total');
            const count = document.getElementById('cart-count');

            if (!items) return;

            let totalPrice = 0;
            if (cart.length === 0) {
                items.innerHTML = `<p style="color:#888; text-align:center; padding:40px 0;">Your cart is empty.</p>`;
            } else {
                items.innerHTML = '';
                cart.forEach((item, index) => {
                    totalPrice += item.price;
                    items.innerHTML += `
                        <div style="display:flex; align-items:center; gap:15px; padding:12px 0; border-bottom:1px solid #333;">
                            <img src="${item.image || 'https://via.placeholder.com/60'}" style="width:60px; height:60px; object-fit:cover; border-radius:10px;">
                            <div style="flex:1;">
                                <h4 style="font-size:14px;">${item.name}</h4>
                                <p style="color:#d4af37; font-weight:600;">Rs. ${formatPrice(item.price)}</p>
                            </div>
                            <button onclick="removeFromCart(${index})" style="background:transparent; border:none; color:#ff4444; font-size:18px; cursor:pointer;">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                });
            }
            if (total) total.textContent = formatPrice(totalPrice);
            if (count) count.textContent = cart.length;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
        }

        // ====================================
        // CART TOGGLE
        // ====================================
        document.getElementById('cart-icon')?.addEventListener('click', function (e) {
            e.preventDefault();
            document.getElementById('cart-sidebar')?.classList.add('active');
        });

        document.getElementById('close-cart')?.addEventListener('click', function () {
            document.getElementById('cart-sidebar')?.classList.remove('active');
        });

        // ====================================
        // MOBILE MENU
        // ====================================
        document.getElementById('menuBtn')?.addEventListener('click', function () {
            document.getElementById('navMenu')?.classList.toggle('active');
        });

        // ====================================
        // LOADER
        // ====================================
        window.addEventListener('load', function () {
            const loader = document.getElementById('loader');
            if (loader) setTimeout(() => loader.classList.add('hide'), 500);
            loadOrders();
            updateCartUI();
            console.log('✅ Orders Page with Firebase Loaded!');
        });

        // Make loadOrders global for refresh button
        window.loadOrders = loadOrders;

        console.log('✅ Orders Page Ready!');
    </script>

</body>

</html>
