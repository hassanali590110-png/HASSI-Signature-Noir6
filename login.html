<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HASSI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0b0b0b;
            padding: 20px;
        }

        .auth-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }

        .auth-box .logo {
            text-align: center;
            font-size: 28px;
            color: #d4af37;
            font-weight: 700;
        }

        .auth-box .logo span {
            display: block;
            color: #888;
            font-size: 13px;
        }

        .auth-box h2 {
            color: #fff;
            text-align: center;
            margin: 20px 0 8px;
        }

        .auth-box p {
            color: #888;
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #0b0b0b;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            outline: none;
        }

        .auth-box input:focus {
            border-color: #d4af37;
        }

        .auth-box button {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .auth-box button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .auth-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-box .link {
            text-align: center;
            margin-top: 15px;
            color: #888;
        }

        .auth-box .link a {
            color: #d4af37;
            text-decoration: none;
        }

        .auth-box .link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .loading-text {
            display: inline-block;
        }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-box">
            <div class="logo">HASSI <span>Signature Noir</span></div>
            <h2>Welcome Back</h2>
            <p>Login to your account</p>
            <div id="loginError" class="error-msg"></div>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" id="loginBtn">🔑 Login</button>
            </form>
            <div class="link">Don't have an account? <a href="signup.html">Sign Up</a></div>
            <div class="link"><a href="index.html">← Back to Home</a></div>
        </div>
    </div>

    <!-- ===== COMPLETE JAVASCRIPT WITH FIREBASE AUTH ===== -->
    <script type="module">
        // ====================================
        // LOGIN - FIREBASE AUTH
        // ====================================
        import { auth, signInWithEmailAndPassword } from './firebase.js';
        
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            // Clear previous error
            loginError.classList.remove('show');
            loginError.textContent = '';

            // Validation
            if (!email || !password) {
                loginError.textContent = '❌ Please fill all fields';
                loginError.classList.add('show');
                return;
            }

            if (!email.includes('@')) {
                loginError.textContent = '❌ Please enter a valid email';
                loginError.classList.add('show');
                return;
            }

            if (password.length < 6) {
                loginError.textContent = '❌ Password must be at least 6 characters';
                loginError.classList.add('show');
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"><i class="fa-solid fa-spinner"></i></span> Logging in...';

            try {
                // Login with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('✅ Login Success:', user.email);

                // Save user to localStorage
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0]
                }));

                // Also try to get user data from Firestore
                try {
                    const { db, doc, getDoc } = await import('./js/firebase.js');
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        localStorage.setItem('currentUser', JSON.stringify({
                            uid: user.uid,
                            email: user.email,
                            name: userData.name || user.email.split('@')[0]
                        }));
                    }
                } catch (e) {
                    console.log('⚠️ Could not fetch user data from Firestore');
                }

                alert('✅ Login Successful! Welcome back!');
                window.location.href = 'index.html';

            } catch (error) {
                console.error('❌ Login Error:', error.code, error.message);

                let msg = '❌ ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        msg += 'No account found with this email. Please sign up first.';
                        break;
                    case 'auth/wrong-password':
                        msg += 'Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        msg += 'Invalid email address format.';
                        break;
                    case 'auth/user-disabled':
                        msg += 'This account has been disabled. Contact support.';
                        break;
                    case 'auth/too-many-requests':
                        msg += 'Too many failed attempts. Please try again later.';
                        break;
                    case 'auth/network-request-failed':
                        msg += 'Network error. Please check your internet connection.';
                        break;
                    default:
                        msg += error.message;
                }

                loginError.textContent = msg;
                loginError.classList.add('show');

            } finally {
                // Reset button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '🔑 Login';
            }
        });

        // ====================================
        // CHECK IF USER IS ALREADY LOGGED IN
        // ====================================
        import { onAuthStateChanged } from './js/firebase.js';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('✅ User already logged in:', user.email);
                // Optional: Redirect to home if already logged in
                // window.location.href = 'index.html';
            }
        });

        console.log('✅ Login Page with Firebase Auth Loaded!');
    </script>
</body>

</html>
